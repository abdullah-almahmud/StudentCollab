<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentCollab – Messages</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/messages.css">
</head>
<body>
<div class="app-container messages-page">
  <div id="site-header"></div>

  <main>
    <div class="msg-card">
      <div class="left-panel">
        <div class="left-header"><h2 class="panel-title">Messages</h2></div>
        <div class="tabs">
          <button class="tab active-all" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="tab" data-filter="teammate" onclick="setFilter('teammate')">Teammate</button>
          <button class="tab" data-filter="projects" onclick="setFilter('projects')">Projects</button>
        </div>
        <div class="search-wrap">
          <input class="search-input" type="text" id="convSearch" placeholder="Search conversations…">
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <div class="right-panel">
        <div class="empty-state" id="emptyChat">
          <p>Select a conversation to start chatting with your team.</p>
        </div>
        <div id="chatPanel" style="display:none;flex-direction:column;flex:1">
          <div class="chat-top">
            <div class="chat-name" id="chatName"></div>
            <div class="chat-gig" id="chatGig"></div>
            <span class="conv-badge badge-team" id="chatBadge">Teammate</span>
          </div>
          <div class="msgs-area" id="msgsArea"></div>
          <div class="input-bar">
            <input class="msg-input" type="text" id="msgInput" placeholder="Type a message…">
            <button class="send-btn" type="button" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer"><p class="footer-text">© 2026 StudentCollab. Connecting students for collaboration and opportunity.</p></footer>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/messages.js"></script>
</body>
</html>
