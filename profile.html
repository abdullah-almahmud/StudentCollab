<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentCollab – Profile</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/profile.css">
</head>
<body>
<div class="app-container">
  <div id="site-header"></div>

  <main class="page-container profile-page">
    <div class="profile-header-row">
      <h1 id="pageTitle">Profile</h1>
      <button class="btn btn-secondary hidden" id="editToggleBtn" onclick="toggleEditMode()">Edit Profile</button>
    </div>

    <div class="profile-grid">
      <aside class="sidebar-card profile-sidebar">
        <div class="profile-avatar-large" id="profileAvatar">?</div>
        <h2 id="profileName">—</h2>
        <p class="profile-role-badge" id="profileRole">Teammate</p>
        <p class="text-muted" id="profileMajor">—</p>

        <div id="viewModeInfo">
          <div class="meta-label">Bio</div>
          <p class="meta-value" id="profileBio">—</p>
          <div class="meta-label">Email</div>
          <p class="meta-value" id="profileEmail">—</p>
          <div class="meta-label">Links</div>
          <div class="profile-links" id="profileLinks"></div>
          <div class="meta-label">Skills</div>
          <div id="skillBadges"></div>
        </div>

        <form id="editModeForm" class="hidden">
          <div class="form-group"><label>Name</label><input class="input" type="text" id="editName"></div>
          <div class="form-group"><label>Major</label><input class="input" type="text" id="editMajor"></div>
          <div class="form-group"><label>Bio</label><textarea class="input" id="editBio" rows="3"></textarea></div>
          <div class="form-group"><label>GitHub URL</label><input class="input" type="url" id="editGithub" placeholder="https://github.com/username"></div>
          <div class="form-group"><label>LinkedIn URL</label><input class="input" type="url" id="editLinkedin" placeholder="https://linkedin.com/in/username"></div>
          <div class="form-group"><label>Website / Portfolio</label><input class="input" type="url" id="editWebsite" placeholder="https://yoursite.dev"></div>
          <div style="display:flex;gap:0.5rem">
            <button type="button" class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save</button>
            <button type="button" class="btn btn-secondary" onclick="toggleEditMode()">Cancel</button>
          </div>
        </form>

        <div id="coreMemberActions" class="hidden" style="margin-top:1.25rem">
          <button class="btn btn-primary btn-sm" id="requestCoreBtn" onclick="requestCoreMember()">Request as Core Teammate</button>
        </div>
      </aside>

      <div class="profile-main-col">
        <section class="main-content-card" id="coreMembersSection">
          <h3>Core Teammates</h3>
          <p class="text-muted section-desc">Trusted collaborators you work with regularly.</p>
          <div class="core-members-grid" id="coreMembersList"></div>
          <div id="pendingRequestsSection" class="hidden">
            <div class="meta-label" style="margin-top:1rem">Pending Requests</div>
            <div id="pendingRequestsList"></div>
          </div>
        </section>

        <section class="main-content-card">
          <h3>Portfolio Showcase</h3>
          <div id="addPortfolioSection" class="add-portfolio-form hidden">
            <h4>Add Project</h4>
            <div class="form-group"><label>Title</label><input class="input" type="text" id="portTitle"></div>
            <div class="form-group"><label>Description</label><textarea class="input" id="portDesc" rows="2"></textarea></div>
            <div class="form-group"><label>Project URL (GitHub, demo, etc.)</label><input class="input" type="url" id="portUrl" placeholder="https://github.com/..."></div>
            <div class="form-group"><label>Status</label><select class="input" id="portStatus"><option value="completed">Completed</option><option value="in_progress">In Progress</option></select></div>
            <div class="form-group"><label>Skills</label><div class="skills-wrap" id="portfolioSkillTags"></div></div>
            <button class="btn btn-primary btn-sm" onclick="addPortfolio()">Add Project</button>
          </div>
          <div id="portfolioList"></div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer"><p class="footer-text">© 2026 StudentCollab. Connecting students for collaboration and opportunity.</p></footer>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/profile.js"></script>
</body>
</html>
