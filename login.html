<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentCollab – Log In</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>Log In</h1>
    <p class="subtitle">Welcome back to StudentCollab</p>
    <p class="subtitle" style="font-size:0.8rem;margin-top:-1rem">Demo: alice@demo.com / demo123</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input class="input" type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="input" type="password" id="password" required>
      </div>
      <p class="error-msg hidden" id="errorMsg"></p>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('errorMsg');
  err.classList.add('hidden');
  try {
    await apiFetch('auth.php?action=login', {
      method: 'POST',
      body: {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      },
    });
    const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
    window.location.href = redirect;
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.remove('hidden');
  }
});
</script>
</body>
</html>
